<!doctype html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta charset="utf-8" />
  <link rel="stylesheet" href="styles.css" />
  <title>Scan</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>
  <div class="no-print topbar">
    <div class="nav">
      <a href="/create.html">Create</a>
      <a href="/list.html">List</a>
      <a href="/scan.html">Scan</a>
      <a href="/inventory.html">Inventory</a>
    </div>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>

  <!-- ✅ bỏ "Scan / Kiểm hàng" -->

  <!-- ✅ chỉ còn 3 nút mode -->
  <div class="card">
    <div class="scan-actions no-print" style="flex-wrap:wrap">
      <button id="modeShip" onclick="setMode('SHIP')">Shipped</button>
      <button id="modeReturn" onclick="setMode('RETURN')">Return</button>
      <button id="modeInv" onclick="setMode('INVENTORY')">Inventory</button>
    </div>

    <div style="margin-top:10px; font-size:13px; opacity:.85" id="modeHint"></div>
    <div id="scanErr" style="margin-top:10px;color:#b00"></div>
  </div>

  <!-- ✅ thông tin item ở TRÊN vùng quét -->
  <div id="itemBox"></div>

  <!-- ✅ vùng quét -->
  <div class="card" style="margin-top:10px">
    <div id="readerWrap" style="display:block">
      <div id="reader" class="qr-reader"></div>
      <div id="hint" style="margin-top:8px;">Đưa QR vào giữa khung</div>
    </div>
    <div id="scanOk" class="scan-ok">Đã quét ✅</div>
  </div>

  <!-- INVENTORY TABLE -->
  <div id="invBox" style="display:none"></div>

<script>
async function logout(){
  await fetch("/api/logout",{method:"POST"});
  location.href="/login.html";
}
function esc(s){
  return (s??"").replace(/[&<>"']/g, m=>({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[m]));
}
function fmtTime(s) {
  if (!s) return "-";
  try {
    const d = new Date(s);
    if (isNaN(d.getTime())) return s;
    return d.toLocaleString();
  } catch(e) { return s; }
}

const itemBox = document.getElementById("itemBox");
const invBox  = document.getElementById("invBox");
const scanErr = document.getElementById("scanErr");

let currentItem = null;

// ====== MODE ======
let MODE = null;
const modeHint = document.getElementById("modeHint");

// auto status mapping
const AUTO_STATUS = {
  SHIP: "SHIPPED",
  RETURN: "HENBIN"
};

// ====== EFFECT ======
let lastScanAt = 0;
const OK_COOLDOWN_MS = 150;

function beep(){
  try{
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.type = "sine";
    o.frequency.value = 1200;  // cao hơn -> nghe rõ hơn
    g.gain.value = 0.08;       // âm lượng
    o.connect(g); g.connect(ctx.destination);
    o.start();
    setTimeout(()=>{ o.stop(); ctx.close(); }, 90); // thời gian tít
  }catch(e){}
}

function flashSuccess(){
  document.body.classList.add("scan-success");
  const ok = document.getElementById("scanOk");
  ok.classList.add("show");

  // ✅ tít + rung nhẹ
  beep();
  if (navigator.vibrate) navigator.vibrate([40]);

  setTimeout(()=> document.body.classList.remove("scan-success"), 220);
  setTimeout(()=> ok.classList.remove("show"), 750);
}
function flashError(){
  document.body.classList.add("scan-error");
  const ok = document.getElementById("scanOk");
  ok.classList.remove("show");
  if (navigator.vibrate) navigator.vibrate([120]);
  setTimeout(()=> document.body.classList.remove("scan-error"), 350);
}

// ====== CAMERA ======
let html5QrCode = null;
let isScanning = false;

async function setMode(m){
  // ✅ nếu bấm lại đúng mode lần 2 => ẩn camera + reset mode
  if (MODE === m){
    MODE = null;
    scanErr.textContent = "";
    modeHint.textContent = "";
    clearLastResult();
    invBox.style.display = "none";
    await stopScan(true);
    document.getElementById("modeShip").classList.remove("active");
    document.getElementById("modeReturn").classList.remove("active");
    document.getElementById("modeInv").classList.remove("active");
    return;
  }

  MODE = m;

  document.getElementById("modeShip").classList.toggle("active", MODE==="SHIP");
  document.getElementById("modeReturn").classList.toggle("active", MODE==="RETURN");
  document.getElementById("modeInv").classList.toggle("active", MODE==="INVENTORY");

  if(MODE==="SHIP"){
    modeHint.textContent = "Shipped: quét 1 lần → tự chuyển trạng thái SHIPPED.";
  }else if(MODE==="RETURN"){
    modeHint.textContent = "Return: quét 1 lần → tự chuyển trạng thái HENBIN.";
  }else{
    modeHint.textContent = "Inventory: quét liên tục, mỗi lần quét sẽ thêm vào bảng hôm nay.";
  }

  clearLastResult();

  if(MODE==="INVENTORY"){
    invBox.style.display = "block";
    renderInvTable();
  }else{
    invBox.style.display = "none";
  }

  // ✅ cam tự bật
  await startScan();
}

function clearLastResult(){
  currentItem = null;
  itemBox.innerHTML = "";
  scanErr.textContent = "";
  document.getElementById("scanOk").classList.remove("show");
}

async function startScan(){
  if(!MODE){
    scanErr.textContent = "Hãy chọn chế độ trước.";
    return;
  }

  scanErr.textContent = "";

  if(!html5QrCode) html5QrCode = new Html5Qrcode("reader");
  if(isScanning) return;

  let devices = [];
  try{
    devices = await Html5Qrcode.getCameras();
  }catch(e){
    scanErr.textContent = "Không mở được camera. Hãy cấp quyền Camera cho Safari/Chrome.";
    return;
  }

  if(!devices?.length){
    scanErr.textContent = "Không tìm thấy camera.";
    return;
  }

  const back = devices.find(d => /back|rear|environment/i.test(d.label)) || devices[0];
  const camId = back.id;

  try{
    isScanning = true;

    await html5QrCode.start(
      camId,
      {
        fps: 20,
        qrbox: (vw, vh) => {
          const s = Math.floor(Math.min(vw, vh) * 0.78);
          return { width: s, height: s };
        },
        disableFlip: true,
        videoConstraints: {
          facingMode: { exact: "environment" },
          width: { ideal: 1920 },
          height: { ideal: 1080 }
        }
      },
      async (decodedText) => {
        const now = Date.now();
        if(now - lastScanAt < OK_COOLDOWN_MS) return;
        lastScanAt = now;

        let token = decodedText;
        try{
          const u = new URL(decodedText);
          const t = new URLSearchParams(u.search).get("token");
          if(t) token = t;
        }catch{}

        const r = await fetch(`/api/scan/${encodeURIComponent(token)}`);
        const j = await r.json().catch(()=> ({}));

        if(!r.ok){
          scanErr.textContent = j.error || "Not found";
          flashError();
          itemBox.innerHTML = "";
          return;
        }

        scanErr.textContent = "";
        currentItem = j.item;

        const isDeleted = (currentItem.is_deleted === 1 || currentItem.status === "DELETED");

        // ===== INVENTORY =====
        if(MODE === "INVENTORY"){
          const addRes = await fetch("/api/inventory/add",{
            method:"POST",
            headers:{ "Content-Type":"application/json" },
            body: JSON.stringify({ token })
          });
          const addJson = await addRes.json().catch(()=>({}));

          if(!addRes.ok){
            flashError();
            scanErr.textContent = addJson.error || "Add failed";
            renderCompactItem(true);
            return;
          }
          flashSuccess();

          if(!isDeleted){
            await setInventory("IN_STOCK", { silent: true });
          }

          await renderInvTable();
          flashSuccess();
          renderCompactItem(false);
          return;
        }

        // ===== SHIP / RETURN =====
        flashSuccess();

        if(!isDeleted){
          const toStatus = AUTO_STATUS[MODE];
          await setStatus(toStatus, { silent: true });
          await reloadCurrentItem();
        }

        renderCompactItem(false);
      },
      () => {}
    );

  }catch(e){
    isScanning = false;
    scanErr.textContent = "Không start được camera. Hãy thử reload trang.";
  }
}

async function stopScan(hideCamera=true){
  if(!html5QrCode || !isScanning){
    if(hideCamera) document.getElementById("readerWrap").style.display = "none";
    return;
  }
  try{
    await html5QrCode.stop();
    await html5QrCode.clear();
  }catch(e){}
  isScanning = false;
  if(hideCamera) document.getElementById("readerWrap").style.display = "none";
}

function renderCompactItem(isError){
  const it = currentItem;
  if(!it){ itemBox.innerHTML = ""; return; }
  const isDeleted = (it.is_deleted === 1 || it.status === "DELETED");

  itemBox.innerHTML = `
    <div class="card" style="border:${isError ? "2px solid #d00" : "1px solid #ddd"}">
      <div style="font-weight:900; font-size:18px">${esc(it.name || "-")}</div>
      <div style="margin-top:6px">Serial: <b>${esc(it.serial_clean || it.serial_raw || "-")}</b></div>

      <div class="pills" style="margin-top:10px">
        <div class="pill">Status: ${esc(it.status || "-")}</div>
        <div class="pill">Inv: ${esc(it.inventory_status || "-")}</div>
      </div>

      ${isDeleted ? `<div style="margin-top:10px;color:#A40000;font-weight:800">Item đã bị xoá (DELETED)</div>` : ""}
    </div>
  `;
}

async function reloadCurrentItem(){
  if(!currentItem?.token) return;
  const r = await fetch(`/api/scan/${encodeURIComponent(currentItem.token)}`);
  const j = await r.json().catch(()=> ({}));
  if(r.ok) currentItem = j.item;
}

async function setStatus(to_status, opts={}){
  if(!currentItem) return;
  const r = await fetch(`/api/items/${currentItem.id}/status`, {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ to_status })
  });
  const j = await r.json().catch(()=> ({}));
  if(!r.ok){
    scanErr.textContent = j.error || "Update failed";
    return;
  }
}

async function setInventory(inventory_status, opts={}){
  if(!currentItem) return;
  const r = await fetch(`/api/items/${currentItem.id}/inventory`, {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ inventory_status })
  });
  const j = await r.json().catch(()=> ({}));
  if(!r.ok){
    scanErr.textContent = j.error || "Update failed";
    return;
  }
}

async function apiGetInvRows(){
  const r = await fetch("/api/inventory/today");
  const j = await r.json().catch(()=>({}));
  return j.rows || [];
}

async function apiClearInvToday(){
  const r = await fetch("/api/inventory/today", { method:"DELETE" });
  if(!r.ok) throw new Error("Clear failed");
}

async function apiExportInv(){
  const r = await fetch("/api/inventory/export", { method:"POST" });
  const j = await r.json().catch(()=>({}));
  if(!r.ok) throw new Error(j.error || "Export failed");
  return j;
}

async function renderInvTable(){
  const rows = await apiGetInvRows();
  invBox.innerHTML = `
    <div class="card">
      <div class="row" style="justify-content:space-between; align-items:center; gap:10px; flex-wrap:wrap">
        <div style="font-weight:900">Inventory bảng hôm nay</div>
        <div class="scan-actions no-print" style="flex-wrap:wrap">
          <button onclick="downloadInvCsv()">Xuất CSV</button>
          <button onclick="resetInventory()" style="border:1px solid #ff9800;background:#fff3e0;color:#e65100">Reset inventory</button>
        </div>
      </div>

      <div style="margin-top:10px; overflow:auto">
        <table cellpadding="8" cellspacing="0" border="1" style="border-collapse:collapse; width:100%; min-width:720px">
          <tr>
            <th>Package</th><th>Name</th><th>Serial</th><th>MVD</th><th>Time</th><th>By</th>
          </tr>
          ${rows.map(r=>`
            <tr>
              <td>${esc(r.package_id)}</td>
              <td>${esc(r.name)}</td>
              <td>${esc(r.serial)}</td>
              <td>${esc(r.mvd)}</td>
              <td>${fmtTime(r.scanned_at)}</td>
              <td>${esc(r.actor)}</td>
            </tr>
          `).join("")}
        </table>
      </div>
      <div style="margin-top:8px; font-size:12px; opacity:.8">
        (Bảng này lưu trên server. Xuất CSV sẽ xoá bảng sau khi xuất thành công.)
      </div>
    </div>
  `;
}

async function resetInventory(){
  if(!confirm("Đưa toàn bộ trạng thái Inventory của tất cả sản phẩm về UNKNOWN? (Lưu ý: Thao tác này KHÔNG xoá bảng bên dưới)")) return;
  const r = await fetch("/api/inventory/reset", { method:"POST" });
  if(!r.ok){
    const j = await r.json().catch(()=>({}));
    alert(j.error || "Reset failed");
    return;
  }
  alert("Đã reset tất cả về UNKNOWN");
  if(MODE === "INVENTORY") await renderInvTable();
}

async function downloadInvCsv(){
  if(!confirm("Xuất CSV và xoá toàn bộ data kiểm kê hôm nay?")) return;
  const j = await apiExportInv();
  if(!j.url){ alert("Không có data để xuất"); return; }
  window.open(j.url, "_blank");
  await renderInvTable();
}
</script>
</body>
</html>
