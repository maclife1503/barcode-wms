<!doctype html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta charset="utf-8" />
  <link rel="stylesheet" href="styles.css" />
  <title>Login - WMS</title>
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      padding-top: 0;
      background: var(--bg);
    }
    .login-card {
      max-width: 400px;
      padding: 40px;
      text-align: center;
    }
    .logo-placeholder {
      width: 64px;
      height: 64px;
      background: var(--primary);
      border-radius: 16px;
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 32px;
      font-weight: 800;
      box-shadow: 0 10px 20px rgba(0, 113, 227, 0.25);
    }
  </style>
</head>
<body>
  <div class="card login-card">
    <div class="logo-placeholder">W</div>
    <h2 style="margin-bottom:8px">Hệ thống WMS</h2>
    <p style="color:var(--muted); font-size:14px; margin-bottom:32px">Vui lòng đăng nhập để bắt đầu làm việc</p>

    <form id="loginForm" onsubmit="event.preventDefault(); login();" style="text-align:left">
      <div style="margin-bottom:20px">
        <label for="u">Tên đăng nhập</label>
        <input name="username" id="u" placeholder="Nhập username" autocomplete="username" required/>
      </div>
      
      <div style="margin-bottom:28px">
        <label for="p">Mật khẩu</label>
        <input name="password" id="p" placeholder="••••••••" type="password" autocomplete="current-password" required/>
      </div>
      
      <button type="submit" id="loginBtn" style="width:100%; padding:14px; font-weight:800; font-size:16px">Đăng nhập ngay</button>
    </form>
    
    <div id="msg" style="margin-top:20px; font-weight:600; font-size:14px; min-height:20px"></div>
  </div>

<script>
const uInput = document.getElementById("u");
const pInput = document.getElementById("p");
let autoLoginTimer = null;

[uInput, pInput].forEach(el => {
  el.addEventListener("input", checkAutoLogin);
  el.addEventListener("change", checkAutoLogin);
});

function checkAutoLogin() {
  if (autoLoginTimer) clearTimeout(autoLoginTimer);
  if (uInput.value.length > 0 && pInput.value.length > 0) {
    autoLoginTimer = setTimeout(() => { if (uInput.value.length > 0 && pInput.value.length > 0) login(); }, 800);
  }
}

async function login(){
  if (autoLoginTimer) clearTimeout(autoLoginTimer);
  const msg = document.getElementById("msg");
  const btn = document.getElementById("loginBtn");
  
  msg.textContent = "⌛ Đang xác thực...";
  msg.style.color = "var(--primary)";
  btn.disabled = true;
  
  try {
    const r = await fetch("/api/login", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ username: uInput.value, password: pInput.value })
    });
    const j = await r.json().catch(() => ({}));
    if(!r.ok){ 
      msg.textContent = "❌ " + (j.error || "Sai tài khoản hoặc mật khẩu"); 
      msg.style.color = "#ef4444";
      btn.disabled = false;
      return; 
    }
    msg.textContent = "✅ Đăng nhập thành công!";
    msg.style.color = "#16a34a";
    setTimeout(() => { location.href = "/create.html"; }, 500);
  } catch (e) {
    msg.textContent = "❌ Lỗi kết nối mạng";
    msg.style.color = "#ef4444";
    btn.disabled = false;
  }
}
</script>
</body>
</html>
