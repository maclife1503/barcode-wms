<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="styles.css" />
  <title>Create - WMS</title>
</head>
<body>
  <div class="no-print topbar">
    <div class="nav">
      <a href="/create.html" class="active">Create</a>
      <a href="/list.html">List</a>
      <a href="/scan.html">Scan</a>
      <a href="/inventory.html">Inventory</a>
      <a href="/settings.html" id="navSettings" style="display:none">Settings</a>
    </div>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>

  <div class="card" style="margin-top:0">
    <h2 style="margin-bottom:8px">Tạo mã / In tem</h2>
    <p style="color:var(--muted); font-size:14px; margin-bottom:20px">Dán nội dung JSON vào ô dưới đây để tự động tạo nhãn và mã QR.</p>
    
    <label for="raw">Nội dung JSON</label>
    <textarea id="raw" placeholder='{"serial":"...","mvd":"...","name":"..."}'></textarea>

    <div class="row" style="margin-top:16px; justify-content: space-between;">
      <div class="row">
        <button id="createBtn" onclick="createItem()" style="padding:12px 24px">Tạo nhãn mẫu</button>
        <button id="pasteBtn" type="button" onclick="pasteJson()" style="background:var(--primary-light); color:var(--primary); font-weight:700">Paste 📋</button>
      </div>
      <button id="clearBtn" type="button" onclick="clearJson()" style="background:transparent; color:var(--muted); border:1px solid var(--border)">Xóa sạch</button>
    </div>
    <div id="err" style="margin-top:10px; color:#ef4444; font-weight:600; font-size:14px"></div>
  </div>

  <div class="card">
    <h3 style="margin-bottom:12px">Cập nhật trạng thái Đã đăng bán (Batch)</h3>
    <p style="color:var(--muted); font-size:13px; margin-bottom:12px">Nhập danh sách Serial (cách nhau bởi dấu phẩy hoặc xuống dòng) để đánh dấu đã đăng bán cho hàng loạt máy.</p>
    <textarea id="batchSerials" placeholder="SN12345, SN67890..." style="height:80px"></textarea>
    <button onclick="batchUpdatePosted()" id="batchBtn" style="margin-top:12px; background:#fef9c3; color:#854d0e; font-weight:700">Cập nhật đã đăng 🏷️</button>
    <div id="batchMsg" style="margin-top:12px; font-weight:600; font-size:14px"></div>
  </div>

  <div id="out"></div>
  <div id="photoBox" style="margin-top:20px"></div>

  <script>
    const photoBox = document.getElementById("photoBox");
    const LABEL_W = 548; 
    const LABEL_H = 338; 

    function wrapText(ctx, text, x, y, maxWidth, lineHeight, maxLines) {
      const words = (text || "").split(/\s+/).filter(Boolean);
      let line = "";
      let lines = 0;
      for (let i = 0; i < words.length; i++) {
        const test = line ? (line + " " + words[i]) : words[i];
        if (ctx.measureText(test).width <= maxWidth) {
          line = test;
        } else {
          ctx.fillText(line, x, y);
          y += lineHeight;
          lines++;
          if (maxLines && lines >= maxLines) return y;
          line = words[i];
        }
      }
      if (line) { ctx.fillText(line, x, y); y += lineHeight; }
      return y;
    }

    function loadImage(src) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = () => reject(new Error("Image load failed: " + src));
        if (/^https?:\/\//i.test(src)) img.crossOrigin = "anonymous";
        img.src = src;
      });
    }

    async function makeLabelPng({ mvd, serial, name, qrDataUrl, logoUrl = "/images/logo.png" }) {
      const canvas = document.createElement("canvas");
      canvas.width = LABEL_W;
      canvas.height = LABEL_H;
      const ctx = canvas.getContext("2d");
      ctx.fillStyle = "#fff";
      ctx.fillRect(0, 0, LABEL_W, LABEL_H);
      const pad = 7;
      const qrSize = 326;
      const qrX = LABEL_W - pad - qrSize;
      const qrY = pad;
      const qrImg = await loadImage(qrDataUrl);
      ctx.imageSmoothingEnabled = false;
      ctx.drawImage(qrImg, qrX, qrY, qrSize, qrSize);
      ctx.save();
      const leftX = pad;
      const textW = qrX - 5 - leftX;
      ctx.beginPath(); ctx.rect(leftX, pad, textW, LABEL_H - pad*2); ctx.clip();
      ctx.fillStyle = "#000";
      ctx.font = "800 34px -apple-system, system-ui, sans-serif";
      let y = pad + 38;
      ctx.fillText(String(mvd || "-").trim(), leftX, y);
      y += 24;
      ctx.font = "700 18px -apple-system, system-ui, sans-serif";
      let sn = (serial || "-").trim();
      while (ctx.measureText(sn).width > textW && sn.length > 4) { sn = sn.slice(0, -2) + "…"; }
      ctx.fillText(sn, leftX, y);
      y += 26;
      ctx.font = "700 20px -apple-system, system-ui, sans-serif";
      wrapText(ctx, (name || "-").trim(), leftX, y, textW, 24, 10);
      ctx.restore();
      try {
        const logoImg = await loadImage(logoUrl);
        ctx.imageSmoothingEnabled = true;
        const scale = Math.min(textW / logoImg.width, 140 / logoImg.height);
        const dw = logoImg.width * scale;
        const dh = logoImg.height * scale;
        ctx.drawImage(logoImg, leftX + (textW-dw)/2, LABEL_H - pad - dh, dw, dh);
      } catch (e) {}
      return canvas.toDataURL("image/png");
    }

    async function logout() { await fetch("/api/logout", { method: "POST" }); location.href = "/login.html"; }

    async function checkAdmin() {
      const r = await fetch("/api/me"); const j = await r.json();
      if (j.role === 'admin') {
        const nav = document.getElementById("navSettings");
        if (nav) nav.style.display = "inline-block";
      }
    }
    checkAdmin();

    function clearJson() {
      document.getElementById("raw").value = "";
      document.getElementById("err").textContent = "";
      document.getElementById("photoBox").innerHTML = "";
    }

    async function pasteJson() {
      try {
        const text = await navigator.clipboard.readText();
        document.getElementById("raw").value = text;
        document.getElementById("err").textContent = "";
        // Tự động tạo mã luôn sau khi paste
        createItem();
      } catch (e) {
        document.getElementById("err").textContent = "Không thể dán. Hãy cấp quyền truy cập clipboard.";
      }
    }

    async function createItem() {
      const err = document.getElementById("err");
      const text = document.getElementById("raw").value.trim();
      if (!text) { err.textContent = "Hãy dán dữ liệu JSON trước."; return; }
      try {
        const r = await fetch("/api/items", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ raw_text: text })
        });
        const j = await r.json();
        if (!r.ok) { err.textContent = j.error || "Lỗi tạo mã"; return; }
        const png = await makeLabelPng({
          mvd: j.item.mvd, serial: j.item.serial_clean || j.item.serial_raw,
          name: j.item.name, qrDataUrl: j.qrDataUrl
        });
        photoBox.innerHTML = `
          <div class="card" style="text-align:center">
            <h3 style="margin-bottom:12px">Nhãn của bạn đã sẵn sàng</h3>
            <div style="background:#f1f5f9; padding:20px; border-radius:12px; display:inline-block">
              <img src="${png}" style="max-width:100%; border-radius:4px; box-shadow:0 10px 25px -5px rgba(0,0,0,0.1)"/>
            </div>
            <p style="color:var(--muted); font-size:13px; margin-top:12px">Nhấn giữ ảnh tem để "Lưu vào Ảnh" (Save Image)</p>
          </div>
        `;
      } catch (e) { err.textContent = "Lỗi kết nối Server."; }
    }

    async function batchUpdatePosted() {
      const input = document.getElementById("batchSerials");
      const msg = document.getElementById("batchMsg");
      const btn = document.getElementById("batchBtn");
      
      const text = input.value.trim();
      if (!text) { msg.textContent = "Hãy nhập ít nhất 1 số Serial."; msg.style.color = "#ef4444"; return; }
      
      btn.disabled = true;
      msg.textContent = "⏳ Đang xử lý...";
      msg.style.color = "var(--primary)";
      
      try {
        const r = await fetch("/api/items/batch-posted", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ serials_text: text })
        });
        const j = await r.json();
        if (r.ok) {
          let html = `✅ Thành công! Đã cập nhật mẫu mới cho ${j.count} máy.`;
          
          if (j.alreadyPosted && j.alreadyPosted.length > 0) {
            html += `<div style="margin-top:10px; padding:10px; background:#eff6ff; color:#1d4ed8; border-radius:8px; font-size:13px; font-family:monospace">
              <b>ℹ️ Đã đăng từ trước (${j.alreadyPosted.length}):</b><br>
              ${j.alreadyPosted.join(", ")}
            </div>`;
          }
          
          if (j.notFound && j.notFound.length > 0) {
            html += `<div style="margin-top:10px; padding:10px; background:#fff1f2; color:#be123c; border-radius:8px; font-size:13px; font-family:monospace">
              <b>❌ Số Serial không tìm thấy (${j.notFound.length}):</b><br>
              ${j.notFound.join(", ")}
            </div>`;
          }
          msg.innerHTML = html;
          msg.style.color = "#16a34a";
          if (j.count > 0) input.value = ""; 
        } else {
          msg.textContent = "❌ Lỗi: " + (j.error || "Thử lại sau");
          msg.style.color = "#ef4444";
        }
      } catch (e) {
        msg.textContent = "❌ Lỗi kết nối server.";
        msg.style.color = "#ef4444";
      } finally {
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
