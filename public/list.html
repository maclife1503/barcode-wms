<!doctype html>
<html>

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta charset="utf-8" />
  <link rel="stylesheet" href="styles.css" />
  <title>List - WMS</title>
</head>

<body>
  <div class="no-print topbar">
    <div class="nav">
      <a href="/create.html" id="navCreate">Create</a>
      <a href="/list.html" id="navList" class="active">List</a>
      <a href="/scan.html" id="navScan">Scan</a>
      <a href="/inventory.html" id="navInventory">Inventory</a>
      <a href="/settings.html" id="navSettings" style="display:none">Settings</a>
    </div>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>

  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px">
    <h2 style="margin:0">Danh sách kho</h2>
    <div id="filterPath" style="font-size:14px; color:var(--primary); font-weight:600"></div>
  </div>

  <!-- Tabs -->
  <div class="row no-print" style="margin-bottom:16px; gap:8px">
    <button class="tab-btn" id="tab-all" onclick="setTab('all')">All</button>
    <button class="tab-btn active" id="tab-stock" onclick="setTab('stock')">Stock</button>
    <button class="tab-btn" id="tab-shipped" onclick="setTab('shipped')">Shipped</button>
    <button class="tab-btn" id="tab-return" onclick="setTab('return')">Return</button>
    <button class="tab-btn" id="tab-not_posted" onclick="setTab('not_posted')">Not Posted 🏷️</button>
  </div>

  <div class="card no-print">
    <div class="row" style="gap:16px">
      <div style="flex:1; min-width:280px">
        <label>Search</label>
        <input id="q" placeholder="Package ID, Serial, Name..." />
      </div>
      <div style="width:160px">
        <label>Status Filter</label>
        <select id="status">
          <option value="">All</option>
          <option>CREATED</option>
          <option>SHIPPED</option>
          <option>RETURN</option>
          <option>RETURNED</option>
        </select>
      </div>
      <div style="width:160px">
        <label>Inventory</label>
        <select id="inventory">
          <option value="">All</option>
          <option>UNKNOWN</option>
          <option>IN_STOCK</option>
          <option>NOT_IN_STOCK</option>
        </select>
      </div>
      <div style="width:140px">
        <label>Posted</label>
        <select id="posted">
          <option value="">All</option>
          <option value="1">Posted 🏷️</option>
          <option value="0">Not Posted</option>
        </select>
      </div>
      <div style="align-self: flex-end; padding-bottom: 2px">
        <button onclick="exportCsv()"
          style="background:var(--primary); color:white; height:42px; padding:0 16px; font-size:14px">Export</button>
      </div>
    </div>
  </div>

  <div id="dashboard"></div>
  <div id="tbl"></div>

  <script>
    let selectedCategory = null;
    let currentTab = 'stock';

    // Thêm style cho Tab
    const style = document.createElement('style');
    style.textContent = `
  .tab-btn {
    background: white;
    color: var(--muted);
    border: 1.5px solid var(--border);
    padding: 8px 16px;
    font-size: 14px;
    box-shadow: none;
    border-radius: 12px;
  }
  .tab-btn.active {
    background: var(--primary);
    color: white;
    border-color: var(--primary);
    box-shadow: 0 4px 10px rgba(0, 113, 227, 0.2);
  }
`;
    document.head.appendChild(style);

    function esc(s) {
      return (s ?? "").replace(/[&<>"']/g, m => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
      }[m]));
    }

    const STATUS_ICON  = { SHIPPED:'🟢', RETURN:'⚫', RETURNED:'⚫', CREATED:'🟡', REQUEST_RETURN:'🟠' };
    const STATUS_STYLE = {
      SHIPPED:       'background:#dcfce7; color:#166534',
      RETURN:        'background:#f1f5f9; color:#64748b',
      RETURNED:      'background:#f1f5f9; color:#64748b',
      CREATED:       'background:#fef9c3; color:#854d0e',
      REQUEST_RETURN:'background:#ffedd5; color:#9a3412'
    };
    function statusPill(status) {
      const icon  = STATUS_ICON[status]  || '❓';
      const style = STATUS_STYLE[status] || 'background:#f1f5f9; color:var(--text)';
      return `<span class="pill" style="${style}">${icon} ${esc(status)}</span>`;
    }

    function showToast(msg, isError = false) {
      let toast = document.getElementById('_toast');
      if (!toast) {
        toast = document.createElement('div');
        toast.id = '_toast';
        toast.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:12px 24px;border-radius:12px;font-size:14px;font-weight:600;z-index:9999;transition:opacity 0.3s;box-shadow:0 4px 16px rgba(0,0,0,0.15);';
        document.body.appendChild(toast);
      }
      toast.textContent = msg;
      toast.style.background = isError ? '#ef4444' : '#22c55e';
      toast.style.color = 'white';
      toast.style.opacity = '1';
      clearTimeout(toast._timer);
      toast._timer = setTimeout(() => { toast.style.opacity = '0'; }, 3000);
    }

    function fmtTime(s) {
      if (!s) return "-";
      try {
        const d = new Date(s);
        if (isNaN(d.getTime())) return s;
        return d.toLocaleString();
      } catch (e) { return s; }
    }

    async function logout() {
      await fetch("/api/logout", { method: "POST" });
      location.href = "/login.html";
    }

    async function requestDelete(id, name) {
      if (!confirm(`Gửi yêu cầu xóa sản phẩm:\n"${name}"?\n\nYêu cầu sẽ được gửi tới admin để duyệt.`)) return;
      try {
        const r = await fetch(`/api/items/${id}/request-delete`, { method: 'POST' });
        const j = await r.json();
        if (j.ok) {
          showToast('✅ Đã gửi yêu cầu xóa tới admin!');
        } else {
          showToast('❌ ' + (j.error || 'Lỗi không xác định'), true);
        }
      } catch (e) {
        showToast('❌ Kết nối thất bại', true);
      }
    }

    async function requestReturn(id, name) {
      if (!confirm(`Gửi yêu cầu Return và Xóa sản phẩm:\n"${name}"?`)) return;
      try {
        const r = await fetch(`/api/items/${id}/request-return`, { method: 'POST' });
        const j = await r.json();
        if (j.ok) {
          showToast('✅ Đã gửi yêu cầu Return thành công!');
        } else {
          showToast('❌ ' + (j.error || 'Lỗi không xác định'), true);
        }
      } catch (e) {
        showToast('❌ Kết nối thất bại', true);
      }
    }

    let currentUserRole = null;
    let currentUserName = null;

    async function checkAuth() {
      const r = await fetch("/api/me"); const j = await r.json();
      currentUserRole = j.role;
      currentUserName = j.user;

      if (j.role === 'admin' && j.user === 'tho') {
        document.getElementById("navSettings").style.display = "inline-block";
      } else if (j.role === 'entry') {
        document.getElementById("navScan").style.display = "none";
        document.getElementById("navInventory").style.display = "none";
        // Tự động đá ra khỏi trang nếu cố tình vào
        if (location.pathname === "/scan.html" ||
          location.pathname === "/inventory.html" ||
          location.pathname === "/settings.html") {
          location.href = "/list.html";
        }
      }
    }
    checkAuth();

    function setTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      document.getElementById(`tab-${tab}`).classList.add('active');

      // Nếu chọn tab khác All, reset status dropdown để tránh xung đột
      if (tab !== 'all') {
        document.getElementById("status").value = "";
        if (tab === 'not_posted') document.getElementById("posted").value = "";
      }

      load();
    }

    function setFilter(cat) {
      selectedCategory = cat;
      document.getElementById("filterPath").innerHTML = cat
        ? `Đang lọc: ${esc(cat)} <span onclick="setFilter(null)" style="cursor:pointer; color:#ef4444; margin-left:8px">✖ Hiện tất cả</span>`
        : "";
      render();
    }

    let cachedData = null;

    async function load() {
      const qEl = document.getElementById("q");
      const statusEl = document.getElementById("status");
      const inventoryEl = document.getElementById("inventory");
      const postedEl = document.getElementById("posted");

      const u = new URL("/api/items", location.origin);
      if (qEl.value) u.searchParams.set("q", qEl.value);
      if (inventoryEl.value) u.searchParams.set("inventory", inventoryEl.value);
      if (postedEl.value) u.searchParams.set("posted", postedEl.value);

      // Tab vs Status Dropdown
      if (currentTab !== 'all') {
        u.searchParams.set("tab", currentTab);
      } else if (statusEl.value) {
        u.searchParams.set("status", statusEl.value);
      }

      // Save state
      sessionStorage.setItem("list_q", qEl.value);
      sessionStorage.setItem("list_status", statusEl.value);
      sessionStorage.setItem("list_inventory", inventoryEl.value);
      sessionStorage.setItem("list_posted", postedEl.value);
      sessionStorage.setItem("list_tab", currentTab);
      if (selectedCategory) sessionStorage.setItem("list_category", selectedCategory);
      else sessionStorage.removeItem("list_category");

      const r = await fetch(u);
      cachedData = await r.json();
      render();
    }

    async function exportCsv() {
      const qEl = document.getElementById("q");
      const statusEl = document.getElementById("status");
      const inventoryEl = document.getElementById("inventory");
      const postedEl = document.getElementById("posted");

      const u = new URL("/api/items/export", location.origin);
      if (qEl.value) u.searchParams.set("q", qEl.value);
      if (inventoryEl.value) u.searchParams.set("inventory", inventoryEl.value);
      if (postedEl.value) u.searchParams.set("posted", postedEl.value);

      if (currentTab !== 'all') {
        u.searchParams.set("tab", currentTab);
      } else if (statusEl.value) {
        u.searchParams.set("status", statusEl.value);
      }

      const res = await fetch(u, { method: "POST" });
      const j = await res.json();
      if (j.url) {
        window.open(j.url, "_blank");
      } else {
        alert("Không có dữ liệu để xuất hoặc có lỗi xảy ra.");
      }
    }

    function render() {
      if (!cachedData) return;
      const tblEl = document.getElementById("tbl");
      const dashEl = document.getElementById("dashboard");

      if (cachedData.error) {
        tblEl.innerHTML = `<div class="card" style="color:#ef4444">${esc(cachedData.error)}</div>`;
        return;
      }

      // Dashboard
      let dashHtml = `<div class="row" style="margin-bottom:10px">`;
      dashHtml += `
    <div class="card interactive" onclick="setFilter(null)" style="flex:1; min-width:120px; text-align:center; ${!selectedCategory ? 'border-color:var(--primary); background:var(--primary-light)' : ''}">
      <div style="font-size:12px; color:var(--muted)">Tổng cộng</div>
      <div style="font-size:24px; font-weight:800; color:var(--primary)">${cachedData.rows.length}</div>
    </div>
  `;
      (cachedData.summary || []).forEach(s => {
        const isActive = selectedCategory === s.category;
        dashHtml += `
      <div class="card interactive" onclick="setFilter('${esc(s.category)}')" style="flex:1; min-width:110px; text-align:center; ${isActive ? 'border-color:var(--primary); background:var(--primary-light)' : ''}">
        <div style="font-size:12px; color:var(--muted); text-transform:capitalize">${esc(s.category)}</div>
        <div style="font-size:20px; font-weight:700">${s.count}</div>
      </div>
    `;
      });
      dashHtml += `</div>`;
      dashEl.innerHTML = dashHtml;

      // Filter by category if selected
      let displayRows = cachedData.rows;
      if (selectedCategory) {
        displayRows = displayRows.filter(item => (item.category || 'else') === selectedCategory);
      }

      // Grouping
      const groups = {};
      const isShippedOrReturn = (currentTab === 'shipped' || currentTab === 'return');

      displayRows.forEach(item => {
        let groupKey;
        if (isShippedOrReturn) {
          if (item.updated_at) {
            const date = new Date(item.updated_at);
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const y = date.getFullYear();
            groupKey = `Tháng ${m}/${y}`;
          } else {
            groupKey = "Khác";
          }
        } else {
          groupKey = item.category || 'else';
        }
        if (!groups[groupKey]) groups[groupKey] = [];
        groups[groupKey].push(item);
      });

      let tablesHtml = "";
      const sortedKeys = Object.keys(groups).sort((a, b) => {
        if (isShippedOrReturn) {
          if (a === 'Khác') return 1;
          if (b === 'Khác') return -1;
          // Sort reverse: Tháng 05/2026 > Tháng 04/2026
          const parseKey = (s) => {
            const parts = s.match(/Tháng (\d+)\/(\d+)/);
            if (!parts) return 0;
            return parseInt(parts[2]) * 100 + parseInt(parts[1]);
          };
          return parseKey(b) - parseKey(a);
        }
        return (a === 'else' ? 1 : b === 'else' ? -1 : a.localeCompare(b));
      });

      sortedKeys.forEach(cat => {
        const items = groups[cat];
        tablesHtml += `
      <h3 style="margin: 24px 0 12px; display:flex; align-items:center; gap:10px; text-transform:capitalize">
        ${esc(cat)} <span class="pill">${items.length}</span>
      </h3>
      <div class="card" style="padding:0; overflow:hidden">
        <div class="table-wrap">
          <table cellpadding="12">
            <thead>
              <tr>
                ${isShippedOrReturn ? `
                  <th style="width:130px">Updated</th>
                  <th style="width:110px">Package</th>
                ` : `
                  <th style="width:110px">Package</th>
                `}
                <th style="width:250px">Name</th>
                <th class="hide-mobile" style="width:160px">Serial</th>
                <th class="hide-mobile" style="width:120px">Inventory</th>
                <th class="hide-mobile" style="width:100px">Stock</th>
                ${!isShippedOrReturn ? `<th style="width:160px">Updated</th>` : ""}
              </tr>
            </thead>
            <tbody>
              ${items.map(r => {
          let diff = 0;
          if (r.status === 'RETURN' || r.status === 'REQUEST_RETURN') {
            diff = 0;
          } else if (r.status === 'SHIPPED' && r.shipped_at) {
            diff = Math.ceil((new Date(r.shipped_at) - new Date(r.created_at)) / (86400000));
          } else {
            diff = Math.ceil((new Date() - new Date(r.created_at)) / (86400000));
          }
          const isStale = (r.status === 'CREATED') && diff > 15;
          const timeStr = isShippedOrReturn 
            ? (r.updated_at ? r.updated_at.substring(0, 10) : "-")
            : fmtTime(r.updated_at);

          return `
                <tr style="${isStale ? 'background:#fff1f2' : ''}">
                  ${isShippedOrReturn ? `
                    <td style="font-size:12px; color:var(--muted); font-weight:600">${timeStr}</td>
                    <td style="font-weight:600"><a href="/item.html?id=${r.id}">${esc(r.package_id)}</a></td>
                  ` : `
                    <td style="font-weight:600"><a href="/item.html?id=${r.id}">${esc(r.package_id)}</a></td>
                  `}
                  <td style="max-width:250px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap" title="${esc(r.name)}">
                    ${r.is_posted ? '<span title="Đã đăng bán">🏷️</span> ' : ''}${esc(r.name)}
                  </td>
                  <td class="hide-mobile" style="color:var(--muted); font-family:monospace; font-size:13px">${esc(r.serial_clean || "-")}</td>
                  <td class="hide-mobile"><span class="pill" style="background:${r.inventory_status === 'IN_STOCK' ? '#dbeafe' : '#f1f5f9'}">${esc(r.inventory_status)}</span></td>
                  <td class="hide-mobile">${diff} ngày ${isStale ? '⚠️' : ''}</td>
                  ${!isShippedOrReturn ? `<td style="font-size:12px; color:var(--muted)">${timeStr}</td>` : ""}
                </tr>
              `}).join("")}
            </tbody>
          </table>
        </div>
      </div>
    `;
      });

      tblEl.innerHTML = tablesHtml || `<div class="card" style="text-align:center; color:var(--muted)">Không tìm thấy sản phẩm nào</div>`;
    }

    document.addEventListener("DOMContentLoaded", () => {
      const qEl = document.getElementById("q");
      const statusEl = document.getElementById("status");
      const inventoryEl = document.getElementById("inventory");

      // Kiểm tra xem là load mới hay là F5 / Back / Quay lại từ trang Detail
      let isReloadOrBack = false;
      const navEntries = performance.getEntriesByType("navigation");
      if (navEntries.length > 0) {
        isReloadOrBack = navEntries[0].type === "reload" || navEntries[0].type === "back_forward";
      } else if (window.performance && window.performance.navigation) {
        isReloadOrBack = window.performance.navigation.type === 1 || window.performance.navigation.type === 2;
      }

      const isFromDetail = document.referrer.includes("item.html");

      // Khôi phục state chỉ khi F5, Back hoặc quay lại từ trang chi tiết
      if (isReloadOrBack || isFromDetail) {
        qEl.value = sessionStorage.getItem("list_q") || "";
        statusEl.value = sessionStorage.getItem("list_status") || "";
        inventoryEl.value = sessionStorage.getItem("list_inventory") || "";
        document.getElementById("posted").value = sessionStorage.getItem("list_posted") || "";
        currentTab = sessionStorage.getItem("list_tab") || "stock";
        selectedCategory = sessionStorage.getItem("list_category") || null;
      } else {
        currentTab = "stock";
      }

      // Cập nhật giao diện tab active
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      const activeTab = document.getElementById(`tab-${currentTab}`);
      if (activeTab) activeTab.classList.add('active');

      let debounceTimer = null;
      qEl.addEventListener("input", () => {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(load, 300);
      });

      qEl.addEventListener("keydown", (e) => { if (e.key === "Enter") load(); });
      statusEl.addEventListener("change", load);
      inventoryEl.addEventListener("change", load);
      document.getElementById("posted").addEventListener("change", load);

      load();
    });
  </script>
</body>

</html>
