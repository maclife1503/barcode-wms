<!doctype html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta charset="utf-8" />
  <link rel="stylesheet" href="styles.css" />
  <title>List - WMS</title>
</head>
<body>
  <div class="no-print topbar">
    <div class="nav">
      <a href="/create.html">Create</a>
      <a href="/list.html" class="active">List</a>
      <a href="/scan.html">Scan</a>
      <a href="/inventory.html">Inventory</a>
      <a href="/settings.html" id="navSettings" style="display:none">Settings</a>
    </div>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>

  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px">
    <h2 style="margin:0">Danh sách kho</h2>
    <div id="filterPath" style="font-size:14px; color:var(--primary); font-weight:600"></div>
  </div>

  <!-- Hệ thống Tabs -->
  <div class="row no-print" style="margin-bottom:16px; gap:8px">
    <button class="tab-btn" id="tab-all" onclick="setTab('all')">Tất cả</button>
    <button class="tab-btn active" id="tab-stock" onclick="setTab('stock')">Stock (Tồn kho)</button>
    <button class="tab-btn" id="tab-shipped" onclick="setTab('shipped')">Shipped (Đã giao)</button>
    <button class="tab-btn" id="tab-return" onclick="setTab('return')">Return (Hoàn trả)</button>
  </div>

  <div class="card no-print">
    <div class="row" style="gap:16px">
      <div style="flex:1; min-width:280px">
        <label>Tìm kiếm</label>
        <input id="q" placeholder="Package ID, Serial, Name..." />
      </div>
      <div style="width:160px">
        <label>Bộ lọc trạng thái</label>
        <select id="status">
          <option value="">Tất cả</option>
          <option>READY_TO_SHIP</option>
          <option>SHIPPED</option>
          <option>RETURNED</option>
          <option>CREATED</option>
        </select>
      </div>
      <div style="width:160px">
        <label>Tồn kho</label>
        <select id="inventory">
          <option value="">Tất cả</option>
          <option>UNKNOWN</option>
          <option>IN_STOCK</option>
          <option>NOT_IN_STOCK</option>
        </select>
      </div>
      <div style="width:140px">
        <label>Đăng bán</label>
        <select id="posted">
          <option value="">Tất cả</option>
          <option value="1">Đã đăng 🏷️</option>
          <option value="0">Chưa đăng</option>
        </select>
      </div>
      <div style="align-self: flex-end; padding-bottom: 2px">
        <button onclick="exportCsv()" style="background:var(--primary); color:white; height:42px; padding:0 16px; font-size:14px">Xuất File</button>
      </div>
    </div>
  </div>

  <div id="dashboard"></div>
  <div id="tbl"></div>

<script>
let selectedCategory = null;
let currentTab = 'stock';

// Thêm style cho Tab
const style = document.createElement('style');
style.textContent = `
  .tab-btn {
    background: white;
    color: var(--muted);
    border: 1.5px solid var(--border);
    padding: 8px 16px;
    font-size: 14px;
    box-shadow: none;
    border-radius: 12px;
  }
  .tab-btn.active {
    background: var(--primary);
    color: white;
    border-color: var(--primary);
    box-shadow: 0 4px 10px rgba(79, 70, 229, 0.2);
  }
`;
document.head.appendChild(style);

function esc(s){
  return (s ?? "").replace(/[&<>"']/g, m => ({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
  }[m]));
}

function fmtTime(s) {
  if (!s) return "-";
  try {
    const d = new Date(s);
    if (isNaN(d.getTime())) return s;
    return d.toLocaleString();
  } catch(e) { return s; }
}

async function logout(){
  await fetch("/api/logout",{method:"POST"});
  location.href="/login.html";
}

async function checkAdmin() {
  const r = await fetch("/api/me");
  const j = await r.json();
  if (j.role === 'admin') {
    const nav = document.getElementById("navSettings");
    if (nav) nav.style.display = "inline-block";
  }
}
checkAdmin();

function setTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
  document.getElementById(`tab-${tab}`).classList.add('active');
  
  // Nếu chọn tab khác All, reset status dropdown để tránh xung đột
  if (tab !== 'all') document.getElementById("status").value = "";
  
  load();
}

function setFilter(cat) {
  selectedCategory = cat;
  document.getElementById("filterPath").innerHTML = cat 
    ? `Đang lọc: ${esc(cat)} <span onclick="setFilter(null)" style="cursor:pointer; color:#ef4444; margin-left:8px">✖ Hiện tất cả</span>`
    : "";
  render();
}

let cachedData = null;

async function load(){
  const qEl = document.getElementById("q");
  const statusEl = document.getElementById("status");
  const inventoryEl = document.getElementById("inventory");
  const postedEl = document.getElementById("posted");

  const u = new URL("/api/items", location.origin);
  if (qEl.value) u.searchParams.set("q", qEl.value);
  if (inventoryEl.value) u.searchParams.set("inventory", inventoryEl.value);
  if (postedEl.value) u.searchParams.set("posted", postedEl.value);
  
  // Tab vs Status Dropdown
  if (currentTab !== 'all') {
    u.searchParams.set("tab", currentTab);
  } else if (statusEl.value) {
    u.searchParams.set("status", statusEl.value);
  }

  const r = await fetch(u);
  cachedData = await r.json();
  render();
}

async function exportCsv() {
  const qEl = document.getElementById("q");
  const statusEl = document.getElementById("status");
  const inventoryEl = document.getElementById("inventory");
  const postedEl = document.getElementById("posted");

  const u = new URL("/api/items/export", location.origin);
  if (qEl.value) u.searchParams.set("q", qEl.value);
  if (inventoryEl.value) u.searchParams.set("inventory", inventoryEl.value);
  if (postedEl.value) u.searchParams.set("posted", postedEl.value);
  
  if (currentTab !== 'all') {
    u.searchParams.set("tab", currentTab);
  } else if (statusEl.value) {
    u.searchParams.set("status", statusEl.value);
  }

  const res = await fetch(u, { method: "POST" });
  const j = await res.json();
  if (j.url) {
    window.open(j.url, "_blank");
  } else {
    alert("Không có dữ liệu để xuất hoặc có lỗi xảy ra.");
  }
}

function render() {
  if (!cachedData) return;
  const tblEl = document.getElementById("tbl");
  const dashEl = document.getElementById("dashboard");

  if (cachedData.error) {
    tblEl.innerHTML = `<div class="card" style="color:#ef4444">${esc(cachedData.error)}</div>`;
    return;
  }

  // Dashboard
  let dashHtml = `<div class="row" style="margin-bottom:10px">`;
  dashHtml += `
    <div class="card interactive" onclick="setFilter(null)" style="flex:1; min-width:120px; text-align:center; ${!selectedCategory ? 'border-color:var(--primary); background:var(--primary-light)' : ''}">
      <div style="font-size:12px; color:var(--muted)">Tổng cộng</div>
      <div style="font-size:24px; font-weight:800; color:var(--primary)">${cachedData.rows.length}</div>
    </div>
  `;
  (cachedData.summary || []).forEach(s => {
    const isActive = selectedCategory === s.category;
    dashHtml += `
      <div class="card interactive" onclick="setFilter('${esc(s.category)}')" style="flex:1; min-width:110px; text-align:center; ${isActive ? 'border-color:var(--primary); background:var(--primary-light)' : ''}">
        <div style="font-size:12px; color:var(--muted); text-transform:capitalize">${esc(s.category)}</div>
        <div style="font-size:20px; font-weight:700">${s.count}</div>
      </div>
    `;
  });
  dashHtml += `</div>`;
  dashEl.innerHTML = dashHtml;

  // Grouping
  const groups = {};
  cachedData.rows.forEach(item => {
    const cat = item.category || 'else';
    if (!groups[cat]) groups[cat] = [];
    groups[cat].push(item);
  });

  let tablesHtml = "";
  const sortedCats = Object.keys(groups).sort((a,b) => (a === 'else' ? 1 : b === 'else' ? -1 : a.localeCompare(b)));

  sortedCats.forEach(cat => {
    if (selectedCategory && cat !== selectedCategory) return;

    const items = groups[cat];
    tablesHtml += `
      <h3 style="margin: 24px 0 12px; display:flex; align-items:center; gap:10px; text-transform:capitalize">
        ${esc(cat)} <span class="pill">${items.length}</span>
      </h3>
      <div class="card" style="padding:0; overflow:hidden">
        <div class="table-wrap">
          <table cellpadding="12">
            <thead>
              <tr>
                <th style="width:110px">Package</th>
                <th style="width:250px">Name</th>
                <th class="hide-mobile" style="width:160px">Serial</th>
                <th style="width:120px">Status</th>
                <th class="hide-mobile" style="width:120px">Inventory</th>
                <th class="hide-mobile" style="width:100px">Stock</th>
                <th class="hide-mobile" style="width:160px">Updated</th>
              </tr>
            </thead>
            <tbody>
              ${items.map(r=>{
                const diff = Math.ceil((new Date() - new Date(r.created_at)) / (86400000));
                const isStale = (r.status === 'READY_TO_SHIP' || r.status === 'CREATED') && diff > 15;
                return `
                <tr style="${isStale ? 'background:#fff1f2' : ''}">
                  <td style="font-weight:600"><a href="/item.html?id=${r.id}">${esc(r.package_id)}</a></td>
                  <td style="max-width:250px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap" title="${esc(r.name)}">
                    ${r.is_posted ? '<span title="Đã đăng bán">🏷️</span> ' : ''}${esc(r.name)}
                  </td>
                  <td class="hide-mobile" style="color:var(--muted); font-family:monospace; font-size:13px">${esc(r.serial_clean || "-")}</td>
                  <td><span class="pill" style="background:${r.status==='SHIPPED'?'#dcfce7':'#f1f5f9'}; color:${r.status==='SHIPPED'?'#166534':'var(--text)'}">${esc(r.status)}</span></td>
                  <td class="hide-mobile"><span class="pill" style="background:${r.inventory_status==='IN_STOCK'?'#dbeafe':'#f1f5f9'}">${esc(r.inventory_status)}</span></td>
                  <td class="hide-mobile">${diff} ngày ${isStale ? '⚠️' : ''}</td>
                  <td class="hide-mobile" style="font-size:12px; color:var(--muted)">${fmtTime(r.updated_at)}</td>
                </tr>
              `}).join("")}
            </tbody>
          </table>
        </div>
      </div>
    `;
  });

  tblEl.innerHTML = tablesHtml || `<div class="card" style="text-align:center; color:var(--muted)">Không tìm thấy sản phẩm nào</div>`;
}

document.addEventListener("DOMContentLoaded", () => {
  const qEl = document.getElementById("q");
  const statusEl = document.getElementById("status");
  const inventoryEl = document.getElementById("inventory");

  let debounceTimer = null;
  qEl.addEventListener("input", () => {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(load, 300);
  });
  
  qEl.addEventListener("keydown", (e) => { if (e.key === "Enter") load(); });
  statusEl.addEventListener("change", load);
  inventoryEl.addEventListener("change", load);
  document.getElementById("posted").addEventListener("change", load);

  load();
});
</script>
</body>
</html>
