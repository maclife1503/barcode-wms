name: Keep Server Alive

on:
  schedule:
    # 8:00, 12:00, 15:00, 18:00, 21:00, 00:00 (GMT+7)
    # Equivalent to UTC: 1:00, 5:00, 8:00, 11:00, 14:00, 17:00
    - cron: '0 1,5,8,11,14,17 * * *'
  workflow_dispatch: # Allows manual triggering from GitHub Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Server
        run: |
          if [ -z "${{ secrets.APP_URL }}" ]; then
            echo "Error: APP_URL secret is not set."
            exit 1
          fi
          curl -f "${{ secrets.APP_URL }}/api/ping"
